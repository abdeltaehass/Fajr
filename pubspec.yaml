name: manar
description: manār - Islamic prayer times, Quran, Qibla, and masjid finder app
publish_to: 'none'
version: 1.2.7+13

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  cached_network_image: ^3.4.1
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_compass: ^0.8.1
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.2.5
  audio_service: ^0.18.15
  just_audio: ^0.10.0
  audio_session: ^0.1.21
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/adhan_rabeh_ibn_darah.mp3
    - assets/audio/adhan_adham_al_sharqawe.mp3
    - assets/audio/adhan_ismail_al_sheikh.mp3
    - assets/audio/adhan_ahmed_el_kourdi.mp3
    - assets/audio/adhan_akhdam_bnu_al_madane.mp3
    # Font licenses ship with the app (OFL requirement for bundled fonts)
    - assets/fonts/OFL-Poppins.txt
    - assets/fonts/OFL-Amiri.txt

  # Bundled so google_fonts uses local files instead of fetching over the
  # network on first launch — instant correct text, works fully offline.
  # Runtime fetching stays enabled as a fallback for any missed variant.
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
